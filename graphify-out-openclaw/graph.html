nodes.forEach((n, i) => {
  n.x = W/2 + (Math.random() - 0.5) * W * 0.6;
  n.y = H/2 + (Math.random() - 0.5) * H * 0.6;
  n.vx = 0; n.vy = 0;
  n.radius = Math.max(8, Math.sqrt(n.size) * 1.5);
  n.color = colors[i % colors.length];
});

// Build node index
const nodeMap = {};
nodes.forEach(n => nodeMap[n.id] = n);

const dt = 0.3;
const repulsion = 800;
const attraction = 0.005;
const damping = 0.92;
const centering = 0.001;

function simulate() {
  // Repulsion
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i+1; j < nodes.length; j++) {
      const dx = nodes[j].x - nodes[i].x;
      const dy = nodes[j].y - nodes[i].y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const f = repulsion / (dist * dist);
      const fx = (dx / dist) * f;
      const fy = (dy / dist) * f;
      nodes[i].vx -= fx; nodes[i].vy -= fy;
      nodes[j].vx += fx; nodes[j].vy += fy;
    }
  }
  // Attraction (links)
  links.forEach(l => {
    const s = nodeMap[l.source]; const t = nodeMap[l.target];
    if (!s || !t) return;
    const dx = t.x - s.x; const dy = t.y - s.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const f = dist * attraction * (l.weight || 1);
    s.vx += (dx/dist)*f; s.vy += (dy/dist)*f;
    t.vx -= (dx/dist)*f; t.vy -= (dy/dist)*f;
  });
  // Centering
  nodes.forEach(n => { n.vx += (W/2 - n.x)*centering; n.vy += (H/2 - n.y)*centering; });
  // Update
  nodes.forEach(n => { n.vx *= damping; n.vy *= damping; n.x += n.vx * dt; n.y += n.vy * dt; });
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  // Links
  links.forEach(l => {
    const s = nodeMap[l.source]; const t = nodeMap[l.target];
    if (!s || !t) return;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(t.x, t.y);
    ctx.strokeStyle = 'rgba(100,130,200,' + Math.min(0.6, (l.weight||1)*0.05) + ')';
    ctx.lineWidth = Math.min(3, (l.weight||1)*0.2);
    ctx.stroke();
  });
  // Nodes
  nodes.forEach(n => {
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.radius, 0, Math.PI*2);
    ctx.fillStyle = n.color;
    ctx.globalAlpha = 0.85;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Label
    if (n.radius > 12) {
      ctx.fillStyle = '#fff';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(n.label, n.x, n.y + n.radius + 14);
    }
  });
}

function frame() { simulate(); draw(); requestAnimationFrame(frame); }
frame();

// Hover
canvas.addEventListener('mousemove', e => {
  const mx = e.clientX, my = e.clientY;
  let found = null;
  nodes.forEach(n => {
    const dx = mx - n.x, dy = my - n.y;
    if (dx*dx + dy*dy < n.radius*n.radius*1.5) found = n;
  });
  if (found) {
    tooltip.style.display = 'block';
    tooltip.style.left = (mx + 16) + 'px';
    tooltip.style.top = (my + 16) + 'px';
    tooltip.innerHTML = '<h3>' + found.label + '</h3><div class="stat">' + found.size + ' nodes &middot; Community ' + found.community + '</div>';
  } else {
    tooltip.style.display = 'none';
  }
});

// Drag
let dragNode = null;
canvas.addEventListener('mousedown', e => {
  const mx = e.clientX, my = e.clientY;
  nodes.forEach(n => {
    const dx = mx - n.x, dy = my - n.y;
    if (dx*dx + dy*dy < n.radius*n.radius*1.5) dragNode = n;
  });
});
canvas.addEventListener('mousemove', e => {
  if (dragNode) { dragNode.x = e.clientX; dragNode.y = e.clientY; dragNode.vx = 0; dragNode.vy = 0; }
});
canvas.addEventListener('mouseup', () => dragNode = null);
